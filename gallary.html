<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dileshwari Inter College Gallery</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
}

header {
    text-align: center;
    padding: 20px;
    background: #1e293b;
    font-size: 24px;
    font-weight: bold;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: #1e293b;
    border-radius: 10px;
    overflow: hidden;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img, .card iframe {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.card p {
    padding: 10px;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<header>
🔥 Dileshwari Inter College Rudhauli Basti Gallery 🔥
</header>

<div class="gallery">

    <!-- Video 1 -->
    <div class="card">
        <iframe src="https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/61575863433730/videos/1504832744070633/" 
        frameborder="0" allowfullscreen></iframe>
        <p>Inter House Long Jump Competition</p>
    </div>

    <!-- Video 2 -->
    <div class="card">
        <iframe src="https://www.facebook.com/plugins/post.php?href=https://www.facebook.com/61575863433730/posts/122155026830862114/" 
        frameborder="0"></iframe>
        <p>रस्सा कशी Competition (Tug of War)</p>
    </div>

    <!-- Photo 1 -->
    <div class="card">
        <img src="https://via.placeholder.com/400x200?text=College+Building">
        <p>College Building View</p>
    </div>

    <!-- Photo 2 -->
    <div class="card">
        <img src="https://via.placeholder.com/400x200?text=Independence+Day">
        <p>Independence Day Celebration</p>
    </div>

    <!-- Photo 3 -->
    <div class="card">
        <img src="https://via.placeholder.com/400x200?text=Students+Event">
        <p>Students Activity Event</p>
    </div>

</div>

</body>
</html>
